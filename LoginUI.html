<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jetstream Login</title>

    <style>
        /* Basic page layout */
        body {
            font-family: Arial, sans-serif;
            background: #e8f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Login container */
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
        }

        /* Header styling */
        h2 {
            text-align: center;
            color: #003366;
            margin-bottom: 20px;
        }

        /* Input fields */
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        /* Login button */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        /* Button hover effect */
        button:hover {
            background: #0055aa;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Jetstream Login</h2>

        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
