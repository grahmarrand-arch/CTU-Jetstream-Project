<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Passenger Details - Jetstream</title>

    <style>
        /* Page layout */
        body {
            font-family: Arial, sans-serif;
            background: #eef4ff;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        /* Form container */
        .form-container {
            background: white;
            padding: 25px;
            width: 450px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.15);
        }

        /* Header */
        h2 {
            text-align: center;
            color: #003366;
        }

        /* Inputs */
        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        /* Submit button */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        /* Hover effect */
        button:hover {
            background: #0055aa;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Passenger Details</h2>

        <form action="/submit_passenger" method="POST">
            <input type="text" name="full_name" placeholder="Full Name" required />
            <input type="number" name="age" placeholder="Age" min="0" required />

            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Non-Binary</option>
                <option>Prefer Not to Say</option>
            </select>

            <input type="text" name="passport" placeholder="Passport Number" required />
            <input type="text" name="nationality" placeholder="Nationality" required />

            <select name="seat_class" required>
                <option value="">Select Seat Class</option>
                <option>Economy</option>
                <option>Premium Economy</option>
                <option>Business</option>
                <option>First Class</option>
            </select>

            <button type="submit">Continue</button>
        </form>
    </div>

</body>
</html>
